title: Suspicious PowerShell Encoded Command
id: a2b1c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: Detects suspicious PowerShell execution with encoded commands, which is a common technique used by attackers to obfuscate malicious payloads.
author: Mohammd-Amjadi-pentest2
date: 2026/03/19
tags:
    - attack.execution
        - attack.t1059.001
            - attack.defense_evasion
                - attack.t1027
                logsource:
                    category: process_creation
                        product: windows
                        detection:
                            selection:
                                    Image|endswith:
                                                - '\powershell.exe'
                                                            - '\pwsh.exe'
                                                                    CommandLine|contains:
                                                                                - ' -EncodedCommand '
                                                                                            - ' -enc '
                                                                                                        - ' -ec '
                                                                                                            filter_legitimate:
                                                                                                                    CommandLine|contains:
                                                                                                                                - 'chocolatey'
                                                                                                                                            - 'WindowsPowerShell\Modules'
                                                                                                                                                condition: selection and not filter_legitimate
                                                                                                                                                falsepositives:
                                                                                                                                                    - Legitimate administrative scripts using encoded commands
                                                                                                                                                        - Software deployment tools
                                                                                                                                                        level: high
                                                                                                                                                        fields:
                                                                                                                                                            - CommandLine
                                                                                                                                                                - ParentCommandLine
                                                                                                                                                                    - User
